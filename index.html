<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮格心理學 - 靈魂圖卡生成器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas (轉圖片核心) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入復古優雅字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121312',     
                        cardPaper: '#F3EFE6',  
                        jungGreen: '#2C3E35',  
                        jungGold: '#B89B5E',   
                        jungText: '#1A1A1A'    
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        #card-preview {
            width: 375px;
            height: 500px;
            background-image: radial-gradient(#D5CFC1 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-darkBg text-gray-200 min-h-screen font-serif p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-jungGold tracking-tighter">Archetype Studio</h1>
                <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">C.G. Jung Content Generator</p>
            </div>
            <button onclick="generateRandomJung()" class="w-full md:w-auto bg-transparent hover:bg-jungGold hover:text-darkBg text-jungGold border border-jungGold px-6 py-2 rounded-full text-sm transition-all duration-300 flex items-center justify-center gap-2">
                🔮 隨機注入榮格靈感
            </button>
        </header>

        <div class="flex flex-col lg:flex-row gap-12 items-start">
            
            <!-- 左側：編輯面板 -->
            <div class="w-full lg:w-5/12 bg-gray-900/50 p-6 rounded-2xl border border-gray-800 backdrop-blur-sm">
                <h2 class="text-lg text-gray-400 mb-6 font-light">Content Editor</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">標題</label>
                        <input type="text" id="input-title" value="陰影覺察練習" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-jungGold transition-colors" oninput="updateCard()">
                    </div>

                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">榮格語錄</label>
                        <textarea id="input-quote" rows="3" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-jungGold transition-colors text-sm" oninput="updateCard()">「向外看的人，做著夢；向內看的人，醒著。」</textarea>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">覺察點 01</label>
                            <input type="text" id="input-pt1" value="承認抗拒：寫下今天最讓你煩躁的事。" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-jungGold" oninput="updateCard()">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">覺察點 02</label>
                            <input type="text" id="input-pt2" value="投射收回：這反映了你不願面對的自己嗎？" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-jungGold" oninput="updateCard()">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">署名 / ID</label>
                        <input type="text" id="input-author" value="@榮格心理學筆記" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-jungGold" oninput="updateCard()">
                    </div>

                    <button onclick="downloadImage()" class="w-full bg-jungGold text-darkBg font-bold py-4 rounded-lg hover:brightness-110 transition-all mt-6 shadow-lg shadow-jungGold/20">
                        儲存為高品質圖片 (PNG)
                    </button>
                </div>
            </div>

            <!-- 右側：即時預覽 (3:4 卡片) -->
            <div class="w-full lg:w-7/12 flex flex-col items-center">
                <div id="card-preview" class="bg-cardPaper relative flex flex-col p-10 overflow-hidden text-jungText">
                    
                    <!-- 裝飾元素 -->
                    <div class="absolute top-0 left-0 w-full h-1 bg-jungGold"></div>
                    
                    <div class="text-center mb-8">
                        <div id="card-tag" class="text-[10px] tracking-[0.3em] text-jungGold uppercase mb-2">Shadow Work</div>
                        <h2 id="card-title" class="text-3xl font-black text-jungGreen tracking-tight mb-4">陰影覺察練習</h2>
                        <div class="w-8 h-[1px] bg-gray-300 mx-auto"></div>
                    </div>

                    <div class="flex-grow flex flex-col justify-center">
                        <div class="relative">
                            <span class="absolute -top-6 -left-4 text-6xl text-gray-200 font-serif opacity-50">“</span>
                            <p id="card-quote" class="text-lg font-medium leading-relaxed italic px-4 relative z-10">「向外看的人，做著夢；向內看的人，醒著。」</p>
                        </div>

                        <div class="mt-12 space-y-6">
                            <div class="flex items-start gap-4">
                                <div class="w-5 h-5 rounded-full border border-jungGold flex items-center justify-center flex-shrink-0 mt-1">
                                    <div class="w-1 h-1 bg-jungGold rounded-full"></div>
                                </div>
                                <p id="card-pt1" class="text-sm font-semibold leading-snug">承認抗拒：寫下今天最讓你煩躁的一件事。</p>
                            </div>
                            <div class="flex items-start gap-4">
                                <div class="w-5 h-5 rounded-full border border-jungGold flex items-center justify-center flex-shrink-0 mt-1">
                                    <div class="w-1 h-1 bg-jungGold rounded-full"></div>
                                </div>
                                <p id="card-pt2" class="text-sm font-semibold leading-snug">投射收回：這是否反映了你不願面對的自己？</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto pt-8 border-t border-gray-200 flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-1">Created by</p>
                            <p id="card-author" class="text-xs font-bold tracking-wider text-jungGreen">@榮格心理學筆記</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-jungGold font-bold tracking-tighter">C.G. JUNG</p>
                        </div>
                    </div>
                </div>
                <p class="mt-6 text-gray-500 text-sm">↑ 此為 3:4 小紅書黃金比例預覽</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 語錄庫 (名言)
        const quotes = [
            "「與其做一個好人，我寧願做一個完整的人。」",
            "「向外看的人，做著夢；向內看的人，醒著。」",
            "「直到你讓潛意識意識化，它都將引導你的生活，而你稱之為命運。」",
            "「每個人都有一個陰影，它越是隱藏在意識生活中，就越黑、越密。」",
            "「我不是發生在我身上的事，我是我選擇成為的人。」",
            "「孤獨並不是來自身邊無人，而是無法溝通內心最要緊的感受。」",
            "「特權是一輩子成為你自己。」",
            "「思考是困難的，這就是為什麼大多數人選擇審判。」"
        ];

        // 2. 練習庫 (成對的覺察點)
        const exercises = [
            {
                tag: "Shadow Work",
                title: "陰影覺察練習",
                points: ["承認抗拒：寫下今天最讓你煩躁的一件事。", "投射收回：這是否反映了你不願面對的自己？"]
            },
            {
                tag: "Persona",
                title: "人格面具剝離",
                points: ["社會角色：你在他人面前最常扮演的完美形象是什麼？", "真實渴望：如果沒人評價你，你現在最想做什麼？"]
            },
            {
                tag: "Individuation",
                title: "個體化之路",
                points: ["接受碎片：找出你過去曾極度討厭自己的一個特質。", "整合力量：這個特質曾在什麼時候保護過你？"]
            },
            {
                tag: "Self-Reflection",
                title: "內在對話",
                points: ["核心價值：剝除工作與財富，剩下什麼能定義你的存在？", "靈魂補償：這份焦慮，是否在提醒你忽略了某個面向？"]
            }
        ];

        // 隨機組合生成邏輯
        function generateRandomJung() {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            const ex = exercises[Math.floor(Math.random() * exercises.length)];
            
            document.getElementById('input-title').value = ex.title;
            document.getElementById('input-quote').value = q;
            document.getElementById('input-pt1').value = ex.points[0];
            document.getElementById('input-pt2').value = ex.points[1];
            
            // 更新標籤
            document.getElementById('card-tag').innerText = ex.tag;

            updateCard();
        }

        // 實時同步預覽
        function updateCard() {
            document.getElementById('card-title').innerText = document.getElementById('input-title').value;
            document.getElementById('card-quote').innerText = document.getElementById('input-quote').value;
            document.getElementById('card-pt1').innerText = document.getElementById('input-pt1').value;
            document.getElementById('card-pt2').innerText = document.getElementById('input-pt2').value;
            document.getElementById('card-author').innerText = document.getElementById('input-author').value;
        }

        // 下載圖片
        function downloadImage() {
            const btn = event.target;
            btn.innerText = "正在生成高畫質圖檔...";
            
            const card = document.getElementById('card-preview');
            html2canvas(card, {
                scale: 4, // 超高解析度
                useCORS: true,
                backgroundColor: "#F3EFE6"
            }).then(canvas => {
                const image = canvas.toDataURL("image/png", 1.0);
                const link = document.createElement('a');
                link.download = `Jung-Post-${new Date().getTime()}.png`;
                link.href = image;
                link.click();
                btn.innerText = "儲存為高品質圖片 (PNG)";
            });
        }
    </script>
</body>
</html>
