        const data = jungDatabase[randomIndex];

        // 更新輸入框
        document.getElementById('input-title').value = data.title;
        document.getElementById('input-quote').value = data.quote;
        document.getElementById('input-pt1').value = data.pt1;
        document.getElementById('input-pt2').value = data.pt2;
        
        // 同步更新標籤
        const catBadge = `<span class="bg-jungGreen text-jungGold text-[10px] px-2 py-1 rounded-full mb-2 inline-block">${data.cat}</span>`;
        document.getElementById('card-category').innerHTML = catBadge;

        updateCard();
